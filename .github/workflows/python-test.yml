name: Python Test

on:
  push:
    branches:
      - main
      - master
      - release/*
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Prove the "runs identically on Windows and Linux" claim on every push,
        # across the lowest and a current supported Python.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies (from the lockfile)
        # Only the dev extra: the [integration] Release API client is not installed,
        # so the live-server test self-skips and the offline suite runs.
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run ruff check .
      - name: Run tests
        run: uv run python -m pytest tests -v
